<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/style.css" />
    <script>
      window.onload = function () {
        if (window.location.hash === "") {
          window.location.hash = "about";
        }
      };
      function updateSelected(id) {
        var links = document.querySelectorAll("#nav a");
        links.forEach(function (link) {
          if (link.id == "a-" + id) {
            link.classList.add("selected");
          } else {
            link.classList.remove("selected");
          }
        });
      }
    </script>
    <title>Mia Zhao</title>
  </head>
  <body>
    <nav id="nav">
      <ul>
        <li>
          <a id="a-about" href="#about" onClick="updateSelected('about')"
            >About</a
          >
        </li>
        <li>
          <a
            id="a-projects"
            href="#projects"
            onClick="updateSelected('projects')"
            >Projects</a
          >
        </li>
        <li>
          <a id="a-contact" href="#contact" onClick="updateSelected('contact')"
            >Contact</a
          >
        </li>
      </ul>
    </nav>
    <main class="content">
      <div id="about" class="content-section"></div>
      <div id="projects" class="content-section">
        <div>
          <img src="./assets/tool.svg" />
        </div>
      </div>
      <div id="contact" class="content-section"></div>
    </main>
  </body>
</html>
